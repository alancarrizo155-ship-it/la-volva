services:
  - type: web
    name: lavolva-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FOOTBALL_DATA_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
